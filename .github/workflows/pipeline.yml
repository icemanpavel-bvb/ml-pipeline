name: ML Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn scipy joblib
      
      - name: Run pipeline
        run: |
          python3 data_creation.py
          python3 data_quality_check.py
          
          # Исправление при наличии проблем
          if [ -f "quality_report.json" ]; then
            HAS_ISSUES=$(python3 -c "
          import json
          with open('quality_report.json') as f:
              r = json.load(f)
              exit(0 if r['summary']['total_missing']+r['summary']['total_zscore_anomalies']+r['summary']['total_iqr_anomalies']>0 else 1)
          ")
            [ $? -eq 0 ] && python3 data_fix.py
          fi
          
          python3 model_preprocessing.py
          python3 model_preparation.py
          python3 model_testing.py
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: pipeline-results
          path: |
            *.pkl
            *.json
